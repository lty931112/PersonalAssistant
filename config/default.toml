# PersonalAssistant 默认配置

[gateway]
# 监听地址
bind = "127.0.0.1"
# 端口
port = 19870
# 认证令牌（可选）。非空时：除 OPTIONS 与 GET /health 外，HTTP/WS 均需同一令牌
# （Authorization: Bearer、X-PA-Token，或 WS 查询参数 token=；审计与批准 API 一并受保护）
auth_token = "${PA_AUTH_TOKEN:-}"
# 是否启用 Tailscale
tailscale_enabled = false

[llm]
# LLM 提供商: anthropic, openai
provider = "anthropic"
# 模型名称
model = "claude-sonnet-4-20250514"
# API 密钥（支持环境变量）
api_key = "${ANTHROPIC_API_KEY}"
# API 基础 URL（可选，用于自定义端点）
base_url = ""
# 最大 token 数
max_tokens = 8192
# 备用模型（名称需与提供商一致）
fallback_model = "claude-3-5-sonnet-20241022"
# 为 true 时：仅当主模型被严格判定为不可用且本机对备用模型探测成功后才切换；429/529 不会触发切换
fallback_switch_enabled = false

[memory]
# 是否启用记忆
enabled = true
# 向量搜索 K 值
vector_search_k = 20
# 关键词阈值
keyword_threshold = 0.3
# 最终 top-k
top_k_final = 5
# 最大遍历深度
max_traversal_hops = 3

[agent]
# 默认最大轮数
default_max_turns = 10
# 工具结果预算（字符数）
tool_result_budget = 50000
# 预算上限（美元，可选）
max_budget_usd = 10.0

[tools]
# 启用的工具列表（"*" 表示全部）
enabled = ["*"]
# 禁用的工具列表
disabled = []
# 权限模式: default, accept_edits, bypass_permissions, plan, auto
permission_mode = "default"

# MCP 工具配置
[mcp]
enabled = false
config_path = "config/mcp.toml"

# 飞书通道配置
[feishu]
enabled = false
app_id = "${FEISHU_APP_ID}"
app_secret = "${FEISHU_APP_SECRET}"
verification_token = "${FEISHU_VERIFICATION_TOKEN}"
# encrypt_key = ""  # 可选
webhook_path = "/feishu/webhook"
port = 19871
allowed_users = []

# 任务管理配置
[task]
db_path = ".pa/tasks.db"
cleanup_days = 30
max_concurrent_tasks = 10
# 非启动关键配置（persona/security/observability/alert）已拆分至：
#   config/runtime.toml
# 启动时会自动加载并覆盖同名字段；如需自定义路径可设置 PA_RUNTIME_CONFIG_PATH。
